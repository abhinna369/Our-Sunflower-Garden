<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sundruu × Chuiimuii 🌻</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:
linear-gradient(180deg,#090912,#151524,#222236);
color:white;
text-align:center;
padding:20px;
}

.card{
background:rgba(255,255,255,.06);
padding:20px;
margin:18px 0;
border-radius:24px;
backdrop-filter:blur(10px);
}

h1{
font-size:38px;
}

.sub{
opacity:.7;
margin-top:8px;
}

button{
padding:14px 20px;
border:none;
border-radius:18px;
background:#ffc857;
font-size:16px;
margin:10px;
}

input{
width:100%;
padding:12px;
border-radius:14px;
border:none;
margin-top:10px;
}

iframe{
width:100%;
height:280px;
border-radius:18px;
border:none;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.photo{
background:#222;
padding:10px;
border-radius:16px;
}

img{
width:100%;
border-radius:12px;
}

.msg{
background:#1c1c2d;
padding:12px;
margin:8px;
border-radius:14px;
}

.counter{
font-size:30px;
margin-top:10px;
color:#ffd54f;
}

footer{
opacity:.5;
margin-top:40px;
}
</style>
</head>

<body>

<div class="card">

<h1>🌻 Our Sunflower Garden</h1>

<div class="sub">
Only for us.
</div>

<div class="counter" id="days"></div>

</div>

<div class="card">

<h2>🎵 Our Song</h2>

<p>Replace below link with your song</p>

<iframe
src="https://open.spotify.com/embed/track/11dFghVXANMlKmJXsNCbNl">
</iframe>

</div>

<div class="card">

<h2>📸 Our Album</h2>

<p>
Open shared Google Photos album
</p>

<button
onclick="
window.open(
'https://photos.app.goo.gl/hfDLMp8vAmVtHGw86'
)
">
Open Album
</button>

</div>

<div class="card">

<h2>💌 Leave a message</h2>

<input
id="message"
placeholder="Write something..."
>

<button onclick="saveMsg()">
Save
</button>

<div id="all"></div>

</div>

<div class="card">

<h2>✨ Promise</h2>

<p>

No matter how many days pass,
this little garden stays.

🌻

</p>

</div>

<footer>
made with too much internet
</footer>

<script>

let start=
new Date("2026-06-26")

let today=
new Date()

let diff=
Math.floor(
(today-start)
/86400000
)

document
.getElementById(
"days"
)
.innerHTML=
diff+
" days"

function saveMsg(){

let x=
document
.getElementById(
"message"
).value

if(!x)return

let msgs=
JSON.parse(
localStorage
.getItem(
"garden"
)
||"[]"
)

msgs.push(x)

localStorage.setItem(
"garden",
JSON.stringify(msgs)
)

show()

document
.getElementById(
"message"
).value=""

}

function show(){

let msgs=
JSON.parse(
localStorage
.getItem(
"garden"
)
||"[]"
)

let html=""

msgs.forEach(v=>{

html+=
`
<div class='msg'>
${v}
</div>
`

})

document
.getElementById(
"all"
).innerHTML=
html

}

show()

</script>

</body>
</html>
